<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS Computer Core — Constraint Solver</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --green: #00ff88;
    --green-dim: #00aa55;
    --green-glow: rgba(0,255,136,0.12);
    --amber: #ffaa00;
    --amber-dim: #aa6600;
    --red: #ff3333;
    --red-dim: #aa1111;
    --blue: #44aaff;
    --blue-dim: #1a4477;
    --yellow: #ffee00;
    --yellow-dim: #887700;
    --bg: #060c08;
    --panel: #080f0b;
    --panel2: #0a1410;
    --border: #1a3322;
    --border-bright: #2a5540;
    --text: #88ccaa;
    --text-dim: #3a6644;
    --text-bright: #aaddbb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 999;
  }

  .container {
    width: 100%;
    max-width: 820px;
    animation: bootup 0.6s ease-out;
  }

  @keyframes bootup {
    from { opacity: 0; transform: scaleY(0.05); }
    to { opacity: 1; transform: scaleY(1); }
  }

  /* ── Header ── */
  .header {
    text-align: center;
    border: 1px solid var(--border);
    padding: 16px;
    background: var(--panel);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 50%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    animation: scan 5s linear infinite;
  }

  @keyframes scan { to { left: 200%; } }

  .header-title {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 900;
    color: var(--green);
    letter-spacing: 4px;
    text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,136,0.3);
    margin-bottom: 4px;
  }

  .header-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
  }

  /* ── Two-column layout ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    align-items: start;
  }

  @media (max-width: 600px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ── Panels ── */
  .panel {
    border: 1px solid var(--border);
    background: var(--panel);
    padding: 14px;
  }

  .panel-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 12px;
  }

  /* ── Attempt builder ── */
  .attempt-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .attempt-num {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    width: 24px;
    flex-shrink: 0;
  }

  .wire-group {
    display: flex;
    gap: 4px;
    flex: 1;
  }

  .wire-btn {
    flex: 1;
    padding: 6px 2px;
    border: 1px solid var(--border);
    background: #040a06;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-dim);
    transition: all 0.15s;
    text-align: center;
    user-select: none;
  }

  .wire-btn:hover { border-color: var(--green-dim); color: var(--green); }

  .wire-btn.sel-R { background: rgba(255,51,51,0.15); border-color: var(--red); color: var(--red); text-shadow: 0 0 6px var(--red); }
  .wire-btn.sel-B { background: rgba(68,170,255,0.12); border-color: var(--blue); color: var(--blue); text-shadow: 0 0 6px var(--blue); }
  .wire-btn.sel-Y { background: rgba(255,238,0,0.1); border-color: var(--yellow); color: var(--yellow); text-shadow: 0 0 6px var(--yellow); }

  .result-group {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .result-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .count-btn {
    width: 26px;
    height: 26px;
    border: 1px solid var(--border);
    background: #040a06;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    user-select: none;
  }

  .count-btn:hover { border-color: var(--green-dim); color: var(--green); }

  .count-display {
    width: 22px;
    text-align: center;
    font-size: 14px;
    color: var(--text-bright);
  }

  .count-display.lit-count { color: var(--green); text-shadow: 0 0 8px rgba(0,255,136,0.5); }
  .count-display.flicker-count { color: var(--amber); text-shadow: 0 0 8px rgba(255,170,0,0.4); }

  .remove-btn {
    width: 22px;
    height: 22px;
    border: 1px solid var(--red-dim);
    background: transparent;
    color: #884444;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .remove-btn:hover { border-color: var(--red); color: var(--red); }

  .add-btn {
    width: 100%;
    padding: 9px;
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }

  .add-btn:hover { border-color: var(--green-dim); color: var(--green); }

  /* ── Solve button ── */
  .solve-btn {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--amber);
    background: transparent;
    color: var(--amber);
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 14px;
    text-transform: uppercase;
  }

  .solve-btn:hover {
    background: rgba(255,170,0,0.08);
    box-shadow: 0 0 20px rgba(255,170,0,0.2);
    text-shadow: 0 0 10px var(--amber);
  }

  .solve-btn:active { transform: scale(0.99); }

  /* ── Results panel ── */
  .results-panel {
    border: 1px solid var(--border);
    background: var(--panel);
    padding: 14px;
    margin-top: 14px;
  }

  .results-count {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .results-count span {
    color: var(--green);
    text-shadow: 0 0 8px rgba(0,255,136,0.4);
    font-size: 15px;
  }

  /* Candidate grid */
  .candidates-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 6px;
    max-height: 320px;
    overflow-y: auto;
  }

  .candidates-grid::-webkit-scrollbar { width: 4px; }
  .candidates-grid::-webkit-scrollbar-track { background: #040a06; }
  .candidates-grid::-webkit-scrollbar-thumb { background: var(--green-dim); }

  .candidate-card {
    border: 1px solid var(--border);
    background: var(--panel2);
    padding: 8px 6px;
    display: flex;
    gap: 3px;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.3s ease;
    cursor: default;
    transition: border-color 0.15s;
  }

  .candidate-card:hover { border-color: var(--border-bright); }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .c-wire {
    width: 22px;
    height: 22px;
    border: 1px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: bold;
    letter-spacing: 0;
  }

  .c-wire.R { border-color: var(--red); color: var(--red); background: rgba(255,51,51,0.1); }
  .c-wire.B { border-color: var(--blue); color: var(--blue); background: rgba(68,170,255,0.08); }
  .c-wire.Y { border-color: var(--yellow); color: var(--yellow); background: rgba(255,238,0,0.06); }

  /* Best guess section */
  .best-guess-section {
    margin-top: 14px;
    border: 1px solid var(--border-bright);
    background: var(--panel2);
    padding: 12px 14px;
  }

  .best-guess-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .best-guess-display {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .best-guess-wire {
    padding: 6px 14px;
    border: 1px solid;
    font-size: 13px;
    letter-spacing: 2px;
  }

  .best-guess-wire.R { border-color: var(--red); color: var(--red); text-shadow: 0 0 8px var(--red); background: rgba(255,51,51,0.08); }
  .best-guess-wire.B { border-color: var(--blue); color: var(--blue); text-shadow: 0 0 8px var(--blue); background: rgba(68,170,255,0.06); }
  .best-guess-wire.Y { border-color: var(--yellow); color: var(--yellow); text-shadow: 0 0 8px var(--yellow); background: rgba(255,238,0,0.05); }

  .best-guess-reasoning {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 8px;
    line-height: 1.6;
    letter-spacing: 0.5px;
  }

  /* Constraint analysis */
  .analysis-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
  }

  .analysis-card {
    border: 1px solid var(--border);
    background: var(--panel2);
    padding: 10px;
  }

  .analysis-title {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .analysis-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 3px;
    align-items: center;
  }

  .analysis-label { color: var(--text-dim); }

  .pos-indicators {
    display: flex;
    gap: 3px;
  }

  .pos-dot {
    width: 14px;
    height: 14px;
    border: 1px solid var(--border);
    font-size: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
  }

  .pos-dot.confirmed { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.08); }
  .pos-dot.possible { border-color: var(--border-bright); color: var(--text); }
  .pos-dot.eliminated { border-color: #1a1a1a; color: #222; background: #040604; }

  .no-results {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--red);
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(255,51,51,0.4);
  }

  .empty-state {
    text-align: center;
    padding: 30px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  /* wire legend */
  .legend {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    font-size: 10px;
  }

  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border: 1px solid; }
  .legend-dot.R { border-color: var(--red); background: rgba(255,51,51,0.2); }
  .legend-dot.B { border-color: var(--blue); background: rgba(68,170,255,0.15); }
  .legend-dot.Y { border-color: var(--yellow); background: rgba(255,238,0,0.12); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  .hint-text {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 6px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-title">CONSTRAINT SOLVER</div>
    <div class="header-sub">Force Sensitive — Computer Core — Circuit Analysis Module</div>
  </div>

  <div class="layout">
    <!-- Left: input -->
    <div>
      <div class="panel">
        <div class="panel-title">▸ ENTER TEST RESULTS</div>

        <div class="legend">
          <div class="legend-item"><div class="legend-dot R"></div><span style="color:var(--red)">RED</span></div>
          <div class="legend-item"><div class="legend-dot B"></div><span style="color:var(--blue)">BLUE</span></div>
          <div class="legend-item"><div class="legend-dot Y"></div><span style="color:var(--yellow)">YLW</span></div>
        </div>

        <div class="hint-text">Click wire buttons to cycle R→B→Y→R. Set lit/flicker counts per attempt.</div>
        <hr class="divider">

        <div id="attemptsContainer"></div>
        <button class="add-btn" onclick="addAttempt()">+ ADD ATTEMPT</button>

        <button class="solve-btn" onclick="solve()">▶ ANALYZE CONSTRAINTS</button>
      </div>
    </div>

    <!-- Right: results -->
    <div>
      <div class="results-panel" id="resultsPanel">
        <div class="empty-state">— AWAITING INPUT —<br><br>Enter attempts and run analysis.</div>
      </div>
    </div>
  </div>

</div>

<script>
  const WIRES = ['R', 'B', 'Y'];
  const WIRE_NEXT = { R: 'B', B: 'Y', Y: 'R' };
  const CONTACTS = ['ONE', 'TWO', 'THREE', 'FOUR'];

  // State
  let attempts = []; // { guess: ['R','B','R','Y'], lit: 0, flicker: 0 }

  function addAttempt() {
    attempts.push({ guess: ['R', 'R', 'B', 'B'], lit: 0, flicker: 0 });
    renderAttempts();
  }

  function removeAttempt(i) {
    attempts.splice(i, 1);
    renderAttempts();
  }

  function cycleWire(attemptIdx, pos) {
    const cur = attempts[attemptIdx].guess[pos];
    attempts[attemptIdx].guess[pos] = WIRE_NEXT[cur];
    renderAttempts();
  }

  function adjustCount(attemptIdx, field, delta) {
    const a = attempts[attemptIdx];
    const newVal = Math.max(0, Math.min(4, a[field] + delta));
    // lit + flicker can't exceed 4
    if (field === 'lit' && newVal + a.flicker > 4) return;
    if (field === 'flicker' && newVal + a.lit > 4) return;
    a[field] = newVal;
    renderAttempts();
  }

  function renderAttempts() {
    const container = document.getElementById('attemptsContainer');
    container.innerHTML = '';

    attempts.forEach((a, i) => {
      const row = document.createElement('div');
      row.style.marginBottom = '14px';
      row.style.borderBottom = '1px solid var(--border)';
      row.style.paddingBottom = '12px';

      // Wire selectors
      const wireRow = document.createElement('div');
      wireRow.className = 'attempt-row';
      wireRow.style.marginBottom = '6px';

      const num = document.createElement('div');
      num.className = 'attempt-num';
      num.textContent = `T${i+1}`;
      wireRow.appendChild(num);

      const wg = document.createElement('div');
      wg.className = 'wire-group';
      a.guess.forEach((w, pos) => {
        const btn = document.createElement('div');
        btn.className = `wire-btn sel-${w}`;
        btn.textContent = w;
        btn.onclick = () => cycleWire(i, pos);
        wg.appendChild(btn);
      });
      wireRow.appendChild(wg);

      const rmBtn = document.createElement('button');
      rmBtn.className = 'remove-btn';
      rmBtn.textContent = '×';
      rmBtn.onclick = () => removeAttempt(i);
      wireRow.appendChild(rmBtn);

      row.appendChild(wireRow);

      // Result counters
      const resultRow = document.createElement('div');
      resultRow.className = 'attempt-row';
      resultRow.style.paddingLeft = '32px';
      resultRow.style.gap = '16px';

      // Lit counter
      const litGroup = document.createElement('div');
      litGroup.className = 'result-group';
      litGroup.innerHTML = `
        <span class="result-label" style="color:var(--green)">● LIT</span>
        <button class="count-btn" onclick="adjustCount(${i},'lit',-1)">−</button>
        <div class="count-display lit-count">${a.lit}</div>
        <button class="count-btn" onclick="adjustCount(${i},'lit',1)">+</button>
      `;
      resultRow.appendChild(litGroup);

      // Flicker counter
      const flickerGroup = document.createElement('div');
      flickerGroup.className = 'result-group';
      flickerGroup.innerHTML = `
        <span class="result-label" style="color:var(--amber)">◌ FLICKER</span>
        <button class="count-btn" onclick="adjustCount(${i},'flicker',-1)">−</button>
        <div class="count-display flicker-count">${a.flicker}</div>
        <button class="count-btn" onclick="adjustCount(${i},'flicker',1)">+</button>
      `;
      resultRow.appendChild(flickerGroup);

      row.appendChild(resultRow);
      container.appendChild(row);
    });

    if (attempts.length === 0) {
      container.innerHTML = '<div style="font-size:10px;color:var(--text-dim);letter-spacing:2px;text-align:center;padding:10px;">No attempts yet</div>';
    }
  }

  // ── Core scoring logic (exact Lua port) ──
  function scoreGuess(guess, solution) {
    const puzzleResults = [false, false, false, false];
    let lit = 0;

    // Pass 1: exact matches
    for (let i = 0; i < 4; i++) {
      if (guess[i] === solution[i]) {
        puzzleResults[i] = true;
        lit++;
      }
    }

    // Pass 2: misplaced (mirrors Lua tempResults dedup)
    let flicker = 0;
    const tempResults = [...puzzleResults];

    for (let i = 0; i < 4; i++) {
      if (!puzzleResults[i]) {
        const curGuess = guess[i];
        let found = false;
        for (let j = 0; j < 4; j++) {
          if (!found && !tempResults[j] && solution[j] === curGuess) {
            flicker++;
            tempResults[j] = true;
            found = true;
          }
        }
      }
    }

    return { lit, flicker };
  }

  // Generate all 81 possible solutions (3^4)
  function allSolutions() {
    const sols = [];
    const w = ['R', 'B', 'Y'];
    for (let a = 0; a < 3; a++)
      for (let b = 0; b < 3; b++)
        for (let c = 0; c < 3; c++)
          for (let d = 0; d < 3; d++)
            sols.push([w[a], w[b], w[c], w[d]]);
    return sols;
  }

  function solve() {
    if (attempts.length === 0) {
      document.getElementById('resultsPanel').innerHTML = '<div class="empty-state">— NO ATTEMPTS ENTERED —</div>';
      return;
    }

    const allSols = allSolutions();

    // Filter solutions consistent with all attempts
    const candidates = allSols.filter(sol => {
      return attempts.every(a => {
        const { lit, flicker } = scoreGuess(a.guess, sol);
        return lit === a.lit && flicker === a.flicker;
      });
    });

    renderResults(candidates);
  }

  // ── Pick best next guess using minimax (minimize worst-case remaining candidates) ──
  function bestNextGuess(candidates) {
    if (candidates.length <= 1) return null;

    const allSols = allSolutions();
    let bestGuess = null;
    let bestWorstCase = Infinity;
    let bestIsCandidate = false;

    allSols.forEach(guess => {
      // For each possible result, count how many candidates remain
      const buckets = {};
      candidates.forEach(sol => {
        const { lit, flicker } = scoreGuess(guess, sol);
        const key = `${lit},${flicker}`;
        buckets[key] = (buckets[key] || 0) + 1;
      });

      const worstCase = Math.max(...Object.values(buckets));
      const isCandidate = candidates.some(c => c.join('') === guess.join(''));

      // Prefer lower worst-case; break ties by preferring candidates
      if (worstCase < bestWorstCase || (worstCase === bestWorstCase && isCandidate && !bestIsCandidate)) {
        bestWorstCase = worstCase;
        bestGuess = guess;
        bestIsCandidate = isCandidate;
      }
    });

    return { guess: bestGuess, worstCase: bestWorstCase, isCandidate: bestIsCandidate };
  }

  // ── Constraint analysis per position per color ──
  function analyzeConstraints(candidates) {
    const colors = ['R', 'B', 'Y'];
    const positions = [0, 1, 2, 3];
    const analysis = {};

    colors.forEach(color => {
      analysis[color] = positions.map(pos => {
        const count = candidates.filter(c => c[pos] === color).length;
        return { count, pct: Math.round(count / candidates.length * 100) };
      });
    });

    return analysis;
  }

  function renderResults(candidates) {
    const panel = document.getElementById('resultsPanel');

    if (candidates.length === 0) {
      panel.innerHTML = `
        <div class="panel-title">▸ ANALYSIS RESULT</div>
        <div class="no-results">⚠ NO VALID SOLUTIONS FOUND<br><br>
        <span style="font-size:10px;color:var(--text-dim)">Check your attempt entries for errors.</span></div>
      `;
      return;
    }

    let html = `<div class="panel-title">▸ ANALYSIS RESULT</div>`;
    html += `<div class="results-count">Remaining candidates: <span>${candidates.length}</span> / 81</div>`;

    // If only 1 solution
    if (candidates.length === 1) {
      const sol = candidates[0];
      html += `<div style="margin-bottom:12px;font-size:11px;color:var(--green);letter-spacing:2px;text-shadow:0 0 8px rgba(0,255,136,0.5);">► SOLUTION IDENTIFIED</div>`;
      html += `<div class="best-guess-display" style="margin-bottom:12px;">`;
      sol.forEach(w => {
        html += `<div class="best-guess-wire ${w}">${w === 'R' ? 'RED' : w === 'B' ? 'BLUE' : 'YLW'}</div>`;
      });
      html += `</div>`;
    } else {
      // Best next guess
      const best = bestNextGuess(candidates);
      if (best) {
        html += `<div class="best-guess-section">`;
        html += `<div class="best-guess-label">▸ RECOMMENDED NEXT TEST</div>`;
        html += `<div class="best-guess-display">`;
        best.guess.forEach(w => {
          html += `<div class="best-guess-wire ${w}">${w === 'R' ? 'RED' : w === 'B' ? 'BLUE' : 'YLW'}</div>`;
        });
        html += `</div>`;
        html += `<div class="best-guess-reasoning">`;
        html += `Worst-case remaining after this test: <span style="color:var(--amber)">${best.worstCase}</span> candidates. `;
        if (best.isCandidate) {
          html += `This guess is itself a valid candidate — it could be the solution.`;
        } else {
          html += `This guess maximizes information gain across all scenarios.`;
        }
        html += `</div></div>`;
      }

      // Constraint map
      const analysis = analyzeConstraints(candidates);
      html += `<div class="analysis-grid">`;
      ['R','B','Y'].forEach(color => {
        const colorName = color === 'R' ? 'RED' : color === 'B' ? 'BLUE' : 'YELLOW';
        const colorVar = color === 'R' ? 'var(--red)' : color === 'B' ? 'var(--blue)' : 'var(--yellow)';
        html += `<div class="analysis-card">`;
        html += `<div class="analysis-title" style="color:${colorVar}">▸ ${colorName} WIRE</div>`;
        analysis[color].forEach((data, pos) => {
          const pct = data.pct;
          const confirmed = pct === 100;
          const eliminated = pct === 0;
          html += `<div class="analysis-row">`;
          html += `<span class="analysis-label">CONTACT ${pos+1}</span>`;
          html += `<span style="color:${confirmed ? 'var(--green)' : eliminated ? 'var(--text-dim)' : colorVar};${confirmed ? 'text-shadow:0 0 6px rgba(0,255,136,0.5)' : ''}">`;
          if (confirmed) html += `✓ CONFIRMED`;
          else if (eliminated) html += `✗ RULED OUT`;
          else html += `${pct}%`;
          html += `</span></div>`;
        });
        html += `</div>`;
      });
      html += `</div>`; // close analysis-grid — 3 color cards
      // Add a 4th card for the candidates grid within the layout
      html += `</div>`; // close analysis-grid early... actually let me restructure

      // Candidate list
      html += `<hr class="divider">`;
      html += `<div style="font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-bottom:8px;">▸ ALL VALID CANDIDATES</div>`;
      html += `<div class="candidates-grid">`;
      candidates.forEach(sol => {
        html += `<div class="candidate-card">`;
        sol.forEach(w => {
          html += `<div class="c-wire ${w}">${w}</div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    }

    // Fix the stray closing div issue from the if/else above
    panel.innerHTML = html;
  }

  // Init with one attempt
  addAttempt();
</script>
</body>
</html>
